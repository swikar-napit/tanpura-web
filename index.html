<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tanpura</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>

  <div class="app">
    <header class="titlebar">
      <p class="eyebrow">Practice companion</p>
      <h1>Web Tanpura</h1>
      <p>Set your shruthi, then let the drone hold the space.</p>
    </header>

    <div class="card">
      <div class="label"><label for="volSlider">Volume</label><span class="value" id="volValue">60%</span></div>
      <input type="range" id="volSlider" min="0" max="100" value="60" style="--fill:60%" aria-label="Volume">
    </div>

    <div class="card">
      <div class="toggle-row">
        <div>
          <div class="name">Madhyam Shruthi</div>
          <div class="sub">Switch tuning mode</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="shruthiToggle" aria-label="Enable Madhyam Shruthi">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="label">Select Pitch <span class="value" id="selectedPitch">C</span></div>
      <div class="pitch-grid" id="pitchGrid" role="group" aria-label="Select pitch"></div>
    </div>

    <div class="card">
      <button class="transport-btn" id="transportBtn" aria-pressed="false">▶ Start</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
